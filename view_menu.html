<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View Menu</title>
    <link rel="icon" type="image/png" href="logo-footer.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin_nav_bar.css" />
    <link rel="stylesheet" href="view_menu.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="sidebar">
      <div>
        <div class="time-section">
          <h5 id="ph-time">5:00 PM</h5>
          <small id="ph-date">07 JAN 2007</small>
        </div>

        <div class="logo-section d-flex align-items-center">
          <img src="logo-footer.png" alt="Logo" />
          <div class="ms-2">
            <h6 class="mb-0 fw-bold text-white">Ordering</h6>
            <h6 class="fw-bold text-white">System</h6>
          </div>
        </div>

        <div class="nav-section">
          <a href="#" class="nav-link">
            <img
              src="pending.svg"
              alt="Icon"
              class="profile-img icon-small"
            />
            Pending Orders
          </a>
          <a href="#" class="nav-link">
            <img src="dining-table.png" alt="Icon" class="profile-img" />
            Table Overview
          </a>
          <a href="#" class="nav-link">
            <img src="menu.svg" alt="Icon" class="profile-img" />
            View Menu
          </a>
          <a href="#" class="nav-link">
            <img src="qr_code.svg" alt="Icon" class="profile-img" />
            QR Codes
          </a>
          <a href="#" class="nav-link">
            <img src="archive.svg" alt="Icon" class="profile-img" />
            Archived Orders
          </a>
        </div>
      </div>

      <div class="bottom-section">
        <p>Logged in as <strong>Manager</strong></p>
        <button class="logout-btn">
          <img src="logout.svg" alt="Icon" class="profile-img2" />
          LOGOUT
        </button>
      </div>
    </div>

    <div class="main-content">
      <h1 class="view-menu-title">VIEW MENU</h1>

      <div class="category-dropdown-container">
        <div class="accordion" id="menuCategoryAccordion">
          <div class="accordion-item">
            <h2 class="accordion-header" id="headingCocktails">
              <button
                class="accordion-button category-dropdown-toggle collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseCocktails"
                aria-expanded="false"
                aria-controls="collapseCocktails"
              >
                COCKTAILS
              </button>
            </h2>

            <div
              id="collapseCocktails"
              class="accordion-collapse collapse show"
              aria-labelledby="headingCocktails"
              data-bs-parent="#menuCategoryAccordion"
            >
              <div class="accordion-body category-items-grid">
                
                <div class="menu-item-card" data-item-id="aperol">
                  <div class="item-details">
                    <span class="item-visual-group">
                      <img
                        src="cocktail.png"
                        alt="Cocktail Icon"
                        class="item-icon"
                      />
                      <span
                        class="info-icon info-icon-btn"
                        data-item-name="The Aperol Affair"
                        data-item-category="Cocktails"
                        data-item-price="450.00"
                        data-item-desc="A perfect balance of bitter and sweet, crafted with premium Aperol, Prosecco, and a splash of soda water."
                      >
                        i
                      </span>
                    </span>
                    <span class="item-name-text">The Aperol Affair</span>
                  </div>
                  <div class="quantity-controls">
                    <button class="qty-minus" aria-label="Decrease quantity">−</button>
                    <span class="qty-display" data-current-qty="99">0</span>
                    <button class="qty-plus" aria-label="Increase quantity">+</button>
                  </div>
                </div>

                <div class="menu-item-card" data-item-id="sangria">
                  <div class="item-details">
                    <span class="item-visual-group">
                      <img
                        src="cocktail.png"
                        alt="Cocktail Icon"
                        class="item-icon"
                      />
                      <span
                        class="info-icon info-icon-btn"
                        data-item-name="White Sangria Special"
                        data-item-category="Cocktails"
                        data-item-price="500.00"
                        data-item-desc="Cupcake Ipsum Dolor Sit Amet Jelly Beans Ice Cream Caramels Sugar Plum. Gummi Bears Candy Canes Sugar Plum Bear Claw Bonbon Brownie Dessert Bear Claw Sweet. Sesame Snaps Marshmallow Powder Lemon Drops Candy Canes Marzipan Jelly-O. Chocolate Bar Halvah Wafer Brownie Jelly Ice Cream Oat Cake."
                      >
                        i
                      </span>
                    </span>
                    <span class="item-name-text">White Sangria Special</span>
                  </div>
                  <div class="quantity-controls">
                    <button class="qty-minus" aria-label="Decrease quantity">−</button>
                    <span class="qty-display" data-current-qty="0">0</span>
                    <button class="qty-plus" aria-label="Increase quantity">+</button>
                  </div>
                </div>

                <div class="menu-item-card" data-item-id="mojito">
                  <div class="item-details">
                    <span class="item-visual-group">
                      <img
                        src="cocktail.png"
                        alt="Cocktail Icon"
                        class="item-icon"
                      />
                      <span
                        class="info-icon info-icon-btn"
                        data-item-name="Patron Ala Mojito"
                        data-item-category="Cocktails"
                        data-item-price="550.00"
                        data-item-desc="A premium twist on the classic Mojito, featuring Patron Silver tequila, fresh mint, lime, and a hint of cane sugar."
                      >
                        i
                      </span>
                    </span>
                    <span class="item-name-text">Patron Ala Mojito</span>
                  </div>
                  <div class="quantity-controls">
                    <button class="qty-minus" aria-label="Decrease quantity">−</button>
                    <span class="qty-display" data-current-qty="0">0</span>
                    <button class="qty-plus" aria-label="Increase quantity">+</button>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="itemDetailsModal" class="modal-overlay">
      <div class="modal-content-container modal-dark-bg">
        <button class="modal-close-btn">&times;</button>

        <div class="modal-header-section">
          <img src="cocktail.png" alt="Icon" class="modal-cocktail-icon" />
          <h2 id="modalItemName" class="modal-title"></h2>
        </div>

        <div class="modal-body-details">
          <p>
            <span class="detail-label">Category:</span>
            <span id="modalCategory"></span>
          </p>
          <p class="price-line">
            <span class="detail-label">Php </span>
            <span id="modalPrice" class="modal-price-value"></span>
          </p>
          <p class="description-heading">Description:</p>
          <p id="modalDescription" class="modal-description-text"></p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="view_menu.js"></script>

    <script>
      // JavaScript to update time and date (kept in the HTML for simple clock)
      function updatePhilippineTime() {
        const optionsTime = { hour: "2-digit", minute: "2-digit", hour12: true };
        const optionsDate = { day: "2-digit", month: "short", year: "numeric" };

        const now = new Date().toLocaleString("en-US", { timeZone: "Asia/Manila" });
        const phDate = new Date(now);

        const timeStr = phDate.toLocaleTimeString("en-US", optionsTime).toUpperCase();
        const dateStr = phDate
          .toLocaleDateString("en-US", optionsDate)
          .toUpperCase()
          .replace(",", "");

        document.getElementById("ph-time").textContent = timeStr;
        document.getElementById("ph-date").textContent = dateStr;
      }

      setInterval(updatePhilippineTime, 1000);
      updatePhilippineTime();
    </script>
  </body>
</html>
