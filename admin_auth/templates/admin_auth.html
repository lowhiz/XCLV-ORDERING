{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'images/logo-footer.png' %}">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_login.css' %}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 bg-light-purple">
        <div class="login-container">
            <h2 class="text-center mb-4 login-title montserrat xclv-text-white fw-bold">XCLV ORDERING SYSTEM</h2>

            <div class="card p-4 shadow-lg rounded-3 login-card">
                <form method="post">
                    {% csrf_token %}
                    <div class="row gx-3 mb-4">
                        <div class="col-6">
                            <input type="text" class="form-control inter" name="adminid" id="adminid" placeholder="Admin ID" required>
                        </div>
                        <div class="col-6">
                            <input type="password" class="form-control inter" name="password" id="password" placeholder="Password" required>
                        </div>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger inter" role="alert">
                                <i class="bi bi-x-octagon-fill me-2"></i>{{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-login inter fw-bold">
                            <img src="{% static 'images/logout.svg' %}" alt="Login Icon" class="custom-login-icon me-2">LOGIN
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
