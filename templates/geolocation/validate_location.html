<!-- XCLV-ORDERING/templates/qr_codes/validate_location.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCLV Ordering - Location Validation</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .loading { color: #666; }
        .error { color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .btn { background: #1976d2; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to XCLV!</h1>
        <h1>Geolocation</h1>

        {% if qr_code %}
        <p>You've scanned the QR code for:</p>
        <h2>{{ qr_code.table_display_name }}</h2>
        <p>Batch: {{ qr_code.batch.batch_name }}</p>
        {% endif %}

        <div id="status">
            <p>We need to verify your location to proceed with ordering.</p>
            <button id="validateLocationBtn" class="btn" onclick="validateLocation()">
                Allow Location Access
            </button>
        </div>

        <div id="loading" style="display: none;" class="loading">
            <p>🔍 Validating your location...</p>
        </div>

        <div id="error" style="display: none;" class="error"></div>
        <div id="success" style="display: none;" class="success"></div>
    </div>

    <script>
        const qr_hash = '{{ qr_hash }}';

        function validateLocation() {
            document.getElementById('validateLocationBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            if (!navigator.geolocation) {
                showError('Geolocation is not supported by this browser.');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    sendLocationToServer(position.coords.latitude, position.coords.longitude);
                },
                function(error) {
                    let errorMessage = 'Unable to get your location. ';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage += 'Please allow location access and try again.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage += 'Location information unavailable.';
                            break;
                        case error.TIMEOUT:
                            errorMessage += 'Location request timed out.';
                            break;
                    }
                    showError(errorMessage);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 300000
                }
            );
        }

        function sendLocationToServer(latitude, longitude) {
            fetch('/order/validate-location/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    qr_token: qr_hash,
                    latitude: latitude,
                    longitude: longitude
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';

                if (data.success) {
                    showSuccess('✅ Location verified! Redirecting to menu...');
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 1500);
                } else {
                    showError(data.error);
                }
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                showError('Network error. Please try again.');
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('validateLocationBtn').disabled = false;
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
