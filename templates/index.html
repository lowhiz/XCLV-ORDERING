<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIR JEORGE POGI</title>
</head>
<body>
    <h1>Welcome!</h1>

    {% if categories %}
        {% for category, items in categories.items %}
            <h2>{{ category }}</h2>
            <ul>
                {% for item in items %}
                    <li>
                        <strong>{{ item.name }}</strong> - ₱{{ item.unit_price }}<br>
                        <small>{{ item.description }}</small>
                    </li>
                {% endfor %}
            </ul>
        {% endfor %}
    {% else %}
        <p>No menu items found.</p>
    {% endif %}
</body>
</html>
