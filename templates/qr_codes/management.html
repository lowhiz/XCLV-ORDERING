{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Management</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'images/admin/logo-footer.png' %}">

    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/admin_nav_bar.css' %}"/>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
</head>
<body>
    <div class="sidebar">
        <!-- Time section -->
        <div class="time-section">
            <h5 id="ph-time">5:00 PM</h5>
            <small id="ph-date">07 JAN 2007</small>
        </div>

        <!-- Logo and title -->
        <div class="logo-section d-flex align-items-center">
            <img src="{% static 'images/admin/logo-footer.png' %}" alt="Logo" />
            <div class="ms-2">
                <h6 class="mb-0 fw-bold text-white">Ordering</h6>
                <h6 class="fw-bold text-white">System</h6>
            </div>
        </div>

        <!-- Navigation links -->
        <div class="nav-section">
            <a href="{% url 'pending_table_orders' %}?admin=true" class="nav-link">
                <img src="{% static 'images/admin/pending.svg' %}" alt="Icon" class="profile-img icon-small" />
                Pending Orders
            </a>

            <a href="{% url 'table_overview' %}" class="nav-link">
                <img src="{% static 'images/admin/dining-table.png' %}" alt="Icon" class="profile-img" />
                Table Overview
            </a>

            <a href="{% url 'view_menu' %}?admin=true" class="nav-link">
                <img src="{% static 'images/admin/menu.svg' %}" alt="Icon" class="profile-img" />
                View Menu
            </a>

            <a href="{% url 'qr_management' %}" class="nav-link">
                <img src="{% static 'images/admin/qr_code.svg' %}" alt="Icon" class="profile-img" />
                QR Codes
            </a>
        </div>
        <!-- Bottom section -->
        <div class="bottom-section">
            <p>Logged in as <strong>Manager</strong></p>
        <button class="logout-btn">
            <img src="{% static 'images/admin/logout.svg' %}" alt="Icon" class="profile-img2" />
            LOGOUT
        </button>
        </div>
    </div>

    <div class="button-group">
        <a href="{% url 'toggle_batch' %}" class="btn btn-toggle">Toggle QR Batch</a>
        <a href="{% url 'close_menu' %}" class="btn btn-close">Close Menu</a>
        <a href="{% url 'admin_toggle_menu' %}" class="btn btn-close">Open Menu</a>
    </div>
</body>
</html>
