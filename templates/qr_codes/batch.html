{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Batch X | QR Codes Management</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo-footer.png' %}">
    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/global.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/admin_nav_bar.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}"/>

    <!-- TESTING WITHOUT DJANGO RUNNING -->
    <link rel="stylesheet" href="../../static/css/global.css"/>
    <link rel="stylesheet" href="../../static/css/admin_nav_bar.css"/>
    <link rel="stylesheet" href="../../static/css/admin_dashboard.css"/>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="sidebar">
        <div>
        <!-- Time section -->
        <div class="time-section">
            <h5 id="ph-time">5:00 PM</h5>
            <small id="ph-date">07 JAN 2007</small>
        </div>

        <!-- Logo and title -->
        <div class="logo-section d-flex align-items-center">
            <img src="{% static 'images/logo-footer.png' %}" alt="Logo" />
            <div class="ms-2">
            <h6 class="mb-0 fw-bold text-white montserrat">Ordering</h6>
            <h6 class="fw-bold text-white montserrat">System</h6>
            </div>
        </div>

        <!-- Navigation links -->
        <div class="nav-section">
            <a href="{% url 'pending_table_orders' %}?admin=true" class="nav-link">
            <img
                src="{% static 'images/pending.svg' %}"
                alt="Icon"
                class="profile-img icon-small"
            />
            Pending Orders
            </a>
            <a href="{% url 'table_overview' %}" class="nav-link">
            <img src="{% static 'images/dining-table.png' %}" alt="Icon" class="profile-img" />
            Table Overview
            </a>
            <a href="{% url 'view_menu' %}?admin=true" class="nav-link">
            <img src="{% static 'images/menu.svg' %}" alt="Icon" class="profile-img" />
            View Menu
            </a>
            <a href="{% url 'qr_management' %}" class="nav-link active">
            <img src="{% static 'images/qr_code.svg' %}" alt="Icon" class="profile-img" />
            QR Codes
            </a>
        </div>
        </div>

        <!-- Bottom section -->
        <div class="bottom-section">
        <p>Logged in as <strong>Manager</strong></p>
        <button class="logout-btn">
            <img src="{% static 'images/logout.svg' %}" alt="Icon" class="profile-img2" />
            LOGOUT
        </button>
        </div>
    </div>

    <div class="main-content">
        <div class="fixed-top-section">
            <h1 class="dashboard-heading">QR CODES MANAGEMENT</h1>
            <h4 class="montserrat">BATCH {{ A }} QR CODES</h4>
        </div>

        <div class="scrollable-menu-section" style="background-color: #CEC8D6;">
            <div class="mx-4">
                <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4">

                    <!-- {% for batch in batches %} -->

                    <div class="col">
                        <div class="batch-card text-center" style="background-color: white">
                            <div class="py-5">
                                <div class="pt-1"></div>
                                <span class="fs-4"> ST1</span>
                                <br>
                                <img src="../../media/qrcodes/BatchA/xclv-st-1-BatchA-0ba859f7-757a-444b-b7e6-7e778f93bdfb_30QoQNj.png" alt="QR Code" class="img-fluid my-3" style="max-height: 150px;"/>

                            </div>
                        </div>
                    </div>

                    <!-- {% endfor %}-->

                </div>
            </div>
        </div>

        <div class="fixed-bottom-section mb-2">
            <div class="d-flex justify-content-center container pt-2">
                <div class="row w-100 g-2">
                    <div class="col">
                        <a href={% url 'qr_management' %} class="btn btn-lg admin-grey-button w-100 fw-bold">
                            BACK
                        </a>
                    </div>
                    <div class="col">
                        <a class="btn btn-lg admin-gold-button w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#moveBatchModal">
                            PRINT QR CODES
                        </a>
                    </div>
                </div>
            </div>

        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Make the URL available to external JavaScript
        window.TABLE_STATUS_API_URL = '{% url "table_status_api" %}';
    </script>
    <script src="{% static 'js/admin_table_overview.js' %}"></script>
    <script src="{% static 'js/admin_time.js' %}"></script>

    <!-- TESTING WITHOUT DJANGO RUNNING -->
     <script src="../../static/js/admin_table_overview.js"></script>
     <script src="../../static/js/admin_time.js"></script>
</body>
</html>
