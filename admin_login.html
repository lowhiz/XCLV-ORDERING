<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin_login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 bg-light-purple">
        <div class="login-container">
            <h2 class="text-center mb-4 text-dark-grey login-title">XCLV ORDERING SYSTEM</h2>
            
            <div class="card p-4 shadow-lg rounded-3 login-card">
                <form id="adminLoginForm">
                    <div class="row gx-3 mb-4">
                        <div class="col-6">
                            <input type="text" class="form-control" id="username" placeholder="Username" required>
                        </div>
                        <div class="col-6">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                        </div>
                    </div>
                    
                    <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                        <i class="bi bi-x-octagon-fill me-2"></i>Incorrect username or password.
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-login">
                            <img src="logout.svg" alt="Login Icon" class="custom-login-icon me-2">LOGIN
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin_login.js"></script>
</body>
</html>
