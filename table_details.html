<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Table Details</title>
    <link rel="icon" type="image/png" href="logo-footer.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="customer_nav_bar.css" />
    <link rel="stylesheet" href="table_details.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark custom-navbar">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <img src="logo-footer.png" alt="XCLV Logo" class="logo" />

          <div class="ms-2">
            <h1 class="mb-0 text-white fw-semibold">XCLV Club Davao</h1>
            <h3 class="for_h3">Table <strong>ST1</strong></h3>
          </div>
        </div>

        <div class="icon-container">
          <img src="dining-table.png" alt="Dining Table Icon" class="icon2" />
        </div>
      </div>
    </nav>

    <div class="container-fluid table-details-container">
        <h2 class="table-title">Table ST 1</h2>
        <p class="table-bill">Table Bill: <strong>Php 1 638.00</strong></p>

        <h3 class="section-title">Ongoing Orders</h3>
        <div class="order-card ongoing">
            <p class="order-time">7:30 PM</p>
            <p class="order-price">Php 555.00</p>
            <p class="order-status">Status: Preparing</p>
        </div>

        <h3 class="section-title">Order History</h3>
        
        <div class="order-card served">
            <p class="order-time">7:00 PM</p>
            <p class="order-price">Php 987.00</p>
            <p class="order-status">Status: Served</p>
        </div>

        <div class="order-card served">
            <p class="order-time">6:00 PM</p>
            <p class="order-price">Php 96.00</p>
            <p class="order-status">Status: Served</p>
        </div>
        
        <button class="btn back-to-menu-btn">BACK TO MENU</button>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
