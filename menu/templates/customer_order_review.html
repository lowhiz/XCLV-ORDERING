{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Order - {{ table_display }}</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo-footer.png' %}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/customer_nav_bar.css' %}" />
    <link rel="stylesheet" href="{% static 'css/order_summary.css' %}" />

    <meta name="csrf-token" content="{{ csrf_token }}">
</head>

<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-dark custom-navbar">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <img src="{% static 'images/logo-footer.png' %}" alt="XCLV Logo" class="logo" />
          <div class="ms-2">
            <h1 class="mb-0 text-white fw-semibold">XCLV Club Davao</h1>
            <h3 class="for_h3">Table <strong>{{ table_display }}</strong></h3>
          </div>
        </div>

        <a href="{% url 'table_details' %}" class="btn btn-primary table-details-btn">
            <img src="{% static 'images/dining-table.png' %}" alt="Dining Table Icon" class="icon2" />
        </a>
      </div>
    </nav>
    <section class="order-section d-flex flex-column align-items-center justify-content-start py-4">
        <div class="order-card p-4">
            <h4 class="fw-bold text-white order-table-header">TABLE {{ table_display }}</h4>
            <p class="status-text order-summary-title mb-4">Order Summary</p>

            <div class="order-list" id="review-items">
                <!-- JS will dynamically insert each order item as:
                    <div class="order-item d-flex mb-2">
                        <span class="item-name">Item Name</span>
                        <span class="item-qty">xQty</span>
                        <span class="item-price">Php Price</span>
                    </div>
                -->
            </div>

            <hr class="divider" />

            <div class="d-flex justify-content-end total-section">
                <strong class="total-label me-3">TOTAL</strong>
                <strong class="total-amount" id="grand-total">Php 0.00</strong>
            </div>
        </div>

        <div class="button-group mt-4 d-flex justify-content-between w-100">
            <a href="{% url 'view_menu' %}?table_id={{ table_id }}" class="btn back-btn">← Back to Menu</a>
            <button onclick="confirmOrder()" class="btn confirm-btn" id="confirm-btn">Confirm Order</button>
        </div>
    </section>

        <!-- Hidden div to pass dataset to JS -->
        <div id="menu-data"
             data-table-id="{{ table_id }}"
             data-table-display="{{ table_display }}"
             data-qr-hash="{{ validated_qr_id }}">
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/order_review.js' %}"></script>
</body>
</html>
