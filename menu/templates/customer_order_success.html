{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Order Confirmation - {{ table_display }}</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo-footer.png' %}" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/global.css' %}" />
    <link rel="stylesheet" href="{% static 'css/customer_nav_bar.css' %}" />
    <link rel="stylesheet" href="{% static 'css/customer_order_success.css' %}" />
  </head>

  <body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-dark custom-navbar">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <!-- Logo -->
          <img src="{% static 'images/logo-footer.png' %}" alt="XCLV Logo" class="logo" />

          <!-- Site title -->
          <div class="ms-2">
            <h1 class="mb-0 text-white fw-semibold montserrat">XCLV Club Davao</h1>
            <h3 class="for_h3 inter">Table <strong>{{ table_display }}</strong></h3>
          </div>
        </div>

        <!-- Right-side icon -->
        <div class="icon-container">
          <a href="{% url 'table_details' %}">
            <img src="{% static 'images/dining-table.png' %}" alt="Dining Table Icon" class="icon2" />
          </a>
        </div>
      </div>
    </nav>

    <!-- Welcome Section -->
    <section class="welcome-section d-flex flex-column justify-content-center align-items-center text-center">
      <div class="welcome-icon mb-4">
        <img src="{% static 'images/check.svg' %}" alt="Success Icon" class="utensil-icon" />
      </div>
      <h2 class="fw-bold text-white mb-2 montserrat">Your order is<br>now in the bar!</h2>
      <p class="text-light mb-4 inter">
        Our staff will review and<br> confirm your order before<br> serving it to your table.
      </p>
      <a href="{% url 'view_menu' %}?table_id={{ table_id }}" class="btn allow-btn px-4 py-2 montserrat text-decoration-none">BACK TO MENU</a>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
