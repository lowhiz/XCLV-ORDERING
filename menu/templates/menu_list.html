{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>XCLV Menu</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo-footer.png' %}" >
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/customer_nav_bar.css' %}" />
    <link rel="stylesheet" href="{% static 'css/menu_review1.css'%}" />
    <link rel="stylesheet" href="{% static 'css/menu_review2.css'%}" />
  </head>
<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-dark custom-navbar">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <!-- Logo -->
          <img src="{% static 'images/logo-footer.png' %}" alt="XCLV Logo" class="logo" />

          <!-- Site title and table info -->
          <div class="ms-2">
            <h1 class="mb-0 text-white fw-semibold">XCLV Club Davao</h1>
            <h3 class="for_h3">Table <strong>{{ table_display }}</strong></h3>
          </div>
        </div>

        <!-- Right-side icon -->
        <div class="icon-container">
            <a href="{% url 'table_details' %}">
                <img src="{% static 'images/dining-table.png' %}" alt="Dining Table Icon" class="icon2" />
            </a>
        </div>
      </div>
    </nav>

    <div class="menu-wrapper container mt-4">
        {% for category, items in categories.items %}
            
            <!-- Dropdown Header -->
            <div class="dropdown-header" id="{{ category|slugify }}Toggle">
                <h2 class="header-text">{{ category }}</h2>
                <i class="bi bi-caret-down-fill dropdown-arrow"></i>
            </div>

            <!-- Dropdown Content -->
            <div class="dropdown-content" id="{{ category|slugify }}Dropdown">
                {% for item in items %}
                    <div class="item-card" 
                        data-item-id="{{ item.id }}" 
                        data-name="{{ item.name }}" 
                        data-category="{{ item.category }}" 
                        data-price="{{ item.unit_price }}" 
                        data-description="{{ item.description }}">
                        <div class="left">
                            <img src="{% static 'images/cocktail.png' %}" class="drink-icon"/>
                            <i class="bi bi-info-circle info-icon"></i>
                            <p class="drink-title">{{ item.name }}</p>
                        </div>
                        <div class="right">
                            <button class="qty-btn minus" data-item-id="{{ item.id }}">−</button>
                            <span class="qty" id="quantity-{{ item.id }}">0</span>
                            <button class="qty-btn plus" 
                                    data-item-id="{{ item.id }}" 
                                    data-item-name="{{ item.name }}" 
                                    data-item-price="{{ item.unit_price }}">+</button>
                        </div>
                    </div>
                {% endfor %}
            </div>
            <br>
        {% endfor %}

        <div class="order-summary mt-4">
            <h2 class="summary-header">Order Summary</h2>
            <ul id="summaryList" class="summary-list"></ul>
            <button class="review-order-btn" >REVIEW ORDER</button>
        </div>
    </div>
    <!-- Modal -->
    <div class="item-modal-overlay" id="itemModalOverlay">
        <div class="item-modal-content" id="itemModalContent">
        <div class="modal-header">
            <h2 class="modal-title">ITEM DESCRIPTION</h2>
            <button class="modal-close-btn" id="modalCloseBtn">&times;</button>
        </div>
        <div class="modal-body"></div>
        </div>
    </div>


    <!-- Hidden element to store table info for JS access -->
    <div id="menu-data"
        data-table-id="{{ table_id }}"
        data-table-display="{{ table_display }}"
        data-qr-hash="{{ qr_hash }}">
    </div>

    <!--This script is to monitor the status of menu so that it will automatically close if menu is closed without represhing the page-->
    <script>
        const tableId = '{{ table_id }}';  
        function checkMenuClosed() {
            fetch("{% url 'check_menu_status' %}")
                .then(response => response.json())
                .then(data => {
                    if (data.menu_closed) {
                        // Redirect to menu_closed page
                        window.location.href = "{% url 'view_menu' %}?table_id=" + tableId;
                    }
                })
                .catch(err => {
                    console.error("Error checking menu status:", err);
                });
        }

        // Check every 5 seconds
        setInterval(checkMenuClosed, 5000);
    </script>
    <script src="{% static 'js/menu_backend_customer.js' %}"></script>
    <script src="{% static 'js/menu_frontend_customer.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </script>

    </body>
</html>
