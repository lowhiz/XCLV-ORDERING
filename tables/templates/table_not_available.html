{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Table Overview</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo-footer.png' %}">
    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS STATIC FILES TO BE LOADED BY DJANGO SERVER -->
    <link rel="stylesheet" href="{% static 'css/global.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/admin_nav_bar.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/pending_orders.css' %}"/>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .fixed-top-section {
            flex-shrink: 0;
            z-index: 10;
        }

        .scrollable-queued-orders {
            flex: 1;
            overflow-y: auto;
            border-radius: 8px;
            background-color: var(--lighter-grey);
        }

        .fixed-middle-section {
            flex-shrink: 0;
            z-index: 10;
        }

        .scrollable-past-orders {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 60px; /* Space for fixed bottom controls */
            border-radius: 8px;
            background-color: var(--lighter-grey);
        }

        .fixed-bottom-section {
            position: fixed;
            bottom: 0;
            left: 280px; /* Account for sidebar width */
            right: 0;
            padding: 1rem;
            z-index: 20;
        }

        .order-card {
            border-style: solid;
            border-width: 2px;
            background-color: white;
            border-radius: 8px;
        }

        /* Responsive adjustment */
        @media (max-width: 992px) {
            .fixed-bottom-section {
                left: 0;
            }
        }
    </style>
</head>

<body>
    {% block sidebar %} {% include 'admin_navbar.html' %} {% endblock sidebar %}

    <div class="main-content">
        <div class="d-flex flex-column justify-content-center align-items-center h-100 pb-4">
            <img src="{% static 'images/archive-box.svg' %}" alt="Inactive Table" class="mb-3" style="max-width: 100px; opacity: 35%;">
            <h2 class="text-center">Table is inactive or has been archived</h2>
            <p class="text-center">No customers have scanned this table's QR Code. <br> To view past activity for this table, go to Archived Orders.</p>
        </div>

        <div class="fixed-bottom-section mb-2">
            <div class="d-flex justify-content-center container pt-2">
                <div class="row w-100 g-2">
                    <div class="col">
                        <a href="{% url 'table_overview' %}" class="btn btn-lg admin-grey-button w-100 fw-bold">
                            <- BACK </a>
                    </div>
                    <div class="col">
                        <a href="{% url 'show_archive_data' %}" class="btn btn-lg admin-gold-button w-100 fw-bold">
                            Show Archive
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/admin_table_overview.js' %}"></script>
    <script src="{% static 'js/admin_time.js' %}"></script>
</body>
</html>
