<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Navbar</title>
    <link rel="icon" type="image/png" href="logo-footer.png">
    <!-- Bootstrap & Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin_nav_bar.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="sidebar">
      <div>
        <!-- Time section -->
        <div class="time-section">
          <h5 id="ph-time">5:00 PM</h5>
          <small id="ph-date">07 JAN 2007</small>
        </div>

        <!-- Logo and title -->
        <div class="logo-section d-flex align-items-center">
          <img src="logo-footer.png" alt="Logo" />
          <div class="ms-2">
            <h6 class="mb-0 fw-bold text-white">Ordering</h6>
            <h6 class="fw-bold text-white">System</h6>
          </div>
        </div>

        <!-- Navigation links -->
        <div class="nav-section">
          <a href="#" class="nav-link">
            <img
              src="pending.svg"
              alt="Icon"
              class="profile-img icon-small"
            />
            Pending Orders
          </a>
          <a href="#" class="nav-link">
            <img src="dining-table.png" alt="Icon" class="profile-img" />
            Table Overview
          </a>
          <a href="#" class="nav-link">
            <img src="menu.svg" alt="Icon" class="profile-img" />
            View Menu
          </a>
          <a href="#" class="nav-link">
            <img src="qr_code.svg" alt="Icon" class="profile-img" />
            QR Codes
          </a>
          <a href="#" class="nav-link">
            <img src="archive.svg" alt="Icon" class="profile-img" />
            Archived Orders
          </a>
        </div>
      </div>

      <!-- Bottom section -->
      <div class="bottom-section">
        <p>Logged in as <strong>Manager</strong></p>
        <button class="logout-btn">
          <img src="logout.svg" alt="Icon" class="profile-img2" />
          LOGOUT
        </button>
      </div>
    </div>

    <!-- Archived Orders-->
    <div class="main-content">
      <div class="fixed-top-section">
            <h1 class="dashboard-heading">ARCHIVED ORDERS</h1>
      </div>

      <div class="scrollable-menu-section" style="background-color: #CEC8D6;">
        <div class="mx-4">
          <div class="row row-cols-2 row-cols-md-3">
            <div class="col">                        
              <div class="py-5">
                // For backend integration in ARCHIVED Orders
                <span class="fs-6 fw-bold">Table XXX</span>
                <div class="fs-6 fw-light">Last Archived at</div>
                <span class="display-3 fw-light">05:00 PM</span>
              </div>                        
            </div>
          </div>
        </div>
      </div>
    </div> 
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
    // JavaScript to update time and date
    function updatePhilippineTime() {
        // --- Date/Time Options ---
        const optionsTime = { hour: '2-digit', minute: '2-digit', hour12: true };
        const optionsDateDay = { day: '2-digit' };
        const optionsDateMonth = { month: 'short' };
        const optionsDateYear = { year: 'numeric' };

        // Get Philippine time zone
        // Note: Using the US locale with the Manila timezone is generally the most reliable way 
        // to control the output format without relying on the user's local settings.
        const now = new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila' });
        const phDate = new Date(now);

        // --- Formatting Time (e.g., 05:00 PM) ---
        // toLocaleTimeString returns "05:00 PM" (with a space)
        const timeStr = phDate.toLocaleTimeString('en-US', optionsTime).toUpperCase(); 

        // --- Formatting Date (e.g., 07 JAN 2007) ---
        const dayStr = phDate.toLocaleDateString('en-US', optionsDateDay);
        const monthStr = phDate.toLocaleDateString('en-US', optionsDateMonth).toUpperCase();
        const yearStr = phDate.toLocaleDateString('en-US', optionsDateYear);

        // Combine day, short month (uppercase), and year with spaces
        const dateStr = `${dayStr} ${monthStr} ${yearStr}`;

        // --- Output to HTML ---
        // Note: You must ensure your HTML structure has elements with these IDs:
        // <div id="ph-time-display"></div>
        // <div id="ph-date-display"></div>
        
        document.getElementById('ph-time').textContent = timeStr;
        document.getElementById('ph-date').textContent = dateStr;
    }

    // Update immediately and then every second
    updatePhilippineTime();
    setInterval(updatePhilippineTime, 1000);
    </script>

  </body>
</html>
