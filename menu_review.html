<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu and Review Order</title>
  <link rel="icon" type="image/png" href="logo-footer.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="customer_nav_bar.css" />
  <link rel="stylesheet" href="menu_review1.css" />
  <link rel="stylesheet" href="menu_review2.css" />
</head>

<body>
  <nav class="navbar navbar-dark custom-navbar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <img src="logo-footer.png" alt="XCLV Logo" class="logo" />
        <div class="ms-2">
          <h1 class="mb-0 text-white fw-semibold">XCLV Club Davao</h1>
          <h3 class="for_h3">Table <strong>ST1</strong></h3>
        </div>
      </div>
      <div class="icon-container">
        <img src="dining-table.png" alt="Dining Table Icon" class="icon2" />
      </div>
    </div>
  </nav>

  <div class="menu-wrapper container mt-4">

    <div class="dropdown-header" id="cocktailToggle">
      <h2 class="header-text">COCKTAILS</h2>
      <i class="bi bi-caret-down-fill dropdown-arrow"></i>
    </div>

    <div class="dropdown-content" id="cocktailDropdown">

      <div class="item-card" data-item="The Aperol Affair">
        <div class="left">
          <img src="cocktail.png" class="drink-icon" />
          <i class="bi bi-info-circle info-icon" data-item="The Aperol Affair"></i>
          <p class="drink-title">The Aperol Affair</p>
        </div>
        <div class="right">
          <button class="qty-btn minus">−</button>
          <span class="qty">0</span>
          <button class="qty-btn plus">+</button>
        </div>
      </div>

      <div class="item-card" data-item="Cucumber Smash">
        <div class="left">
          <img src="cocktail.png" class="drink-icon" />
          <i class="bi bi-info-circle info-icon" data-item="Cucumber Smash"></i>
          <p class="drink-title">Cucumber Smash</p>
        </div>
        <div class="right">
          <button class="qty-btn minus">−</button>
          <span class="qty">0</span>
          <button class="qty-btn plus">+</button>
        </div>
      </div>

      


    </div>

    

    <div class="order-summary mt-4">
      <h2 class="summary-header">Order Summary</h2>
      <ul id="summaryList" class="summary-list"></ul>

      <button class="review-order-btn">REVIEW ORDER</button>
    </div>

  </div>

  <div class="item-modal-overlay" id="itemModalOverlay">
    <div class="item-modal-content" id="itemModalContent">
      <div class="modal-header">
        <h2 class="modal-title">ITEM DESCRIPTION</h2>
        <button class="modal-close-btn" id="modalCloseBtn">&times;</button>
      </div>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="menu_review.js"></script>
</body>
</html>
