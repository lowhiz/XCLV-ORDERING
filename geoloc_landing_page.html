<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Geolocation Access</title>
    <link rel="icon" type="image/png" href="logo-footer.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="customer_nav_bar.css" />
    <link rel="stylesheet" href="geoloc_landing_page.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark custom-navbar">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <img src="logo-footer.png" alt="XCLV Logo" class="logo" />

          <div class="ms-4">
            <h1 class="mb-0 text-white fw-semibold">XCLV Club Davao</h1>
          </div>
        </div>

        
      </div>
    </nav>

    <section class="welcome-section d-flex flex-column justify-content-center align-items-center text-center">
      <div class="welcome-icon mb-4">
        <img src="fork_and_knife.svg" alt="Utensils Icon" class="utensil-icon" />
      </div>
      <h2 class="fw-bold text-white mb-2">Welcome to XCLV!</h2>
      <p class="text-light mb-4">
        We need to verify your<br>
        location to proceed with<br>
        ordering.
      </p>
      
      <div class="status-container mb-3">
        <div class="success-card d-flex align-items-center">
          <div>
            <p class="success-text mb-0">Location validated successfully</p>
            <p class="redirect-text mb-0">Redirecting to menu...</p>
          </div>
        </div>
      </div>
      
      <button class="btn allow-btn px-4 py-2">ALLOW LOCATION ACCESS</button>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
