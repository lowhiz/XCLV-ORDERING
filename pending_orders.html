<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pending Orders</title>
  <link rel="icon" type="image/png" href="logo-footer.png" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="admin_nav_bar.css" />
  <link rel="stylesheet" href="pending_orders.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
</head>

<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <!-- Time Section -->
      <div class="time-section">
        <h5 id="ph-time">5:00 PM</h5>
        <small id="ph-date">07 JAN 2007</small>
      </div>

      <!-- Logo Section -->
      <div class="logo-section d-flex align-items-center">
        <img src="logo-footer.png" alt="Logo" />
        <div class="ms-2">
          <h6 class="mb-0 fw-bold text-white">Ordering</h6>
          <h6 class="fw-bold text-white">System</h6>
        </div>
      </div>

      <!-- Navigation -->
      <div class="nav-section">
        <a href="#" class="nav-link">
          <img src="pending.svg" alt="Pending" class="profile-img icon-small" /> Pending Orders
        </a>
        <a href="#" class="nav-link">
          <img src="dining-table.png" alt="Table Overview" class="profile-img" /> Table Overview
        </a>
        <a href="#" class="nav-link">
          <img src="menu.svg" alt="Menu" class="profile-img" /> View Menu
        </a>
        <a href="#" class="nav-link">
          <img src="qr_code.svg" alt="QR Codes" class="profile-img" /> QR Codes
        </a>
        <a href="#" class="nav-link">
          <img src="archive.svg" alt="Archive" class="profile-img" /> Archived Orders
        </a>
      </div>
    </div>

    <!-- Bottom Section -->
    <div class="bottom-section">
      <p>Logged in as <strong>Manager</strong></p>
      <button class="logout-btn">
        <img src="logout.svg" alt="Logout" class="profile-img2" /> LOGOUT
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h1 class="page-title">PENDING ORDERS</h1>

    <div class="order-list">
      <!-- Example Order Item -->
      <div class="order-item">
        <div class="order-details">
          <div class="table-id-time">
            <span class="table-id">ST1</span>
            <span class="order-time">7:30 PM</span>
          </div>
          <div class="order-items">
            <p class="item-name">x2 RICE</p>
            <p class="item-name">x2 FRENCH FRIES</p>
          </div>
        </div>

        <div class="order-actions">
          <button class="action-btn edit-btn">
            <img src="edit.svg" alt="Edit" class="action-icon" />
          </button>
          <button class="action-btn reject-btn">
            <img src="x.svg" alt="Reject" class="action-icon" />
          </button>
          <button class="action-btn accept-btn">
            <img src="check.svg" alt="Accept" class="action-icon" />
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

 <script>
    // JavaScript to update time and date
    function updatePhilippineTime() {
        // --- Date/Time Options ---
        const optionsTime = { hour: '2-digit', minute: '2-digit', hour12: true };
        const optionsDateDay = { day: '2-digit' };
        const optionsDateMonth = { month: 'short' };
        const optionsDateYear = { year: 'numeric' };

        // Get Philippine time zone
        // Note: Using the US locale with the Manila timezone is generally the most reliable way 
        // to control the output format without relying on the user's local settings.
        const now = new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila' });
        const phDate = new Date(now);

        // --- Formatting Time (e.g., 05:00 PM) ---
        // toLocaleTimeString returns "05:00 PM" (with a space)
        const timeStr = phDate.toLocaleTimeString('en-US', optionsTime).toUpperCase(); 

        // --- Formatting Date (e.g., 07 JAN 2007) ---
        const dayStr = phDate.toLocaleDateString('en-US', optionsDateDay);
        const monthStr = phDate.toLocaleDateString('en-US', optionsDateMonth).toUpperCase();
        const yearStr = phDate.toLocaleDateString('en-US', optionsDateYear);

        // Combine day, short month (uppercase), and year with spaces
        const dateStr = `${dayStr} ${monthStr} ${yearStr}`;

        // --- Output to HTML ---
        // Note: You must ensure your HTML structure has elements with these IDs:
        // <div id="ph-time-display"></div>
        // <div id="ph-date-display"></div>
        
        document.getElementById('ph-time').textContent = timeStr;
        document.getElementById('ph-date').textContent = dateStr;
    }

    // Update immediately and then every second
    updatePhilippineTime();
    setInterval(updatePhilippineTime, 1000);
    </script>
</body>

</html>
