<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Order Confirmation</title>
    <link rel="icon" type="image/png" href="logo-footer.png" />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="customer_nav_bar.css" />
    <link rel="stylesheet" href="order_confirmation.css" />
  </head>

  <body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-dark custom-navbar">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <!-- Logo -->
          <img src="logo-footer.png" alt="XCLV Logo" class="logo" />

          <!-- Site title -->
          <div class="ms-2">
            <h1 class="mb-0 text-white fw-semibold">XCLV Club Davao</h1>
            <h3 class="for_h3">Table <strong>ST1</strong></h3>
          </div>
        </div>

        <!-- Right-side icon -->
        <div class="icon-container">
          <img src="dining-table.png" alt="Dining Table Icon" class="icon2" />
        </div>
      </div>
    </nav>

    <!-- Welcome Section -->
    <section class="welcome-section d-flex flex-column justify-content-center align-items-center text-center">
      <div class="welcome-icon mb-4">
        <img src="check_circle.svg" alt="Utensils Icon" class="utensil-icon" />
      </div>
      <h2 class="fw-bold text-white mb-2">Your order is<br>now in the bar!</h2>
      <p class="text-light mb-4">
        Our staff will review and<br> confirm your order before<br> serving it to your table.
      </p>
      <button class="btn allow-btn px-4 py-2">BACK TO MENU</button>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
