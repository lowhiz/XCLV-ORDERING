<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Order Summary</title>
    <link rel="icon" type="image/png" href="logo-footer.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="customer_nav_bar.css" />
    <link rel="stylesheet" href="order_summary.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark custom-navbar">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <div class="d-flex align-items-center">
          <img src="logo-footer.png" alt="XCLV Logo" class="logo" />

          <div class="ms-2">
            <h1 class="mb-0 text-white fw-semibold">XCLV Club Davao</h1>
            <small class="text-warning fw-semibold">Table ST1</small>
          </div>
        </div>

        <div class="icon-container">
          <img src="dining-table.png" alt="Cart Icon" class="icon2" />
        </div>  
      </div>
    </nav>

    <section
      class="order-section d-flex flex-column align-items-center justify-content-start py-4"
    >
      <div class="order-card p-4">
        <h4 class="fw-bold text-white order-table-header">TABLE ST 1</h4>
        <p class="status-text order-summary-title mb-4">Order Summary</p>

        <div class="order-list">
          <div class="order-item d-flex mb-2">
            <span class="item-name">White Sangria Special</span>
            <span class="item-qty">x9</span>
            <span class="item-price">Php 99,999.00</span>
          </div>
          <div class="order-item d-flex mb-2">
            <span class="item-name">Blow Job</span>
            <span class="item-qty">x9</span>
            <span class="item-price">Php 99,999.00</span>
          </div>
          <div class="order-item d-flex mb-2">
            <span class="item-name">Premium Japanese Beef Wagyu Cubes 5000</span>
            <span class="item-qty">x9</span>
            <span class="item-price">Php 99,999.00</span>
          </div>
          <div class="order-item d-flex mb-3">
            <span class="item-name">Patron Ala Mojita</span>
            <span class="item-qty">x9</span>
            <span class="item-price">Php 99,999.00</span>
          </div>

          <hr class="divider" />

          <div class="d-flex justify-content-end total-section">
            <strong class="total-label">TOTAL</strong>
            <strong class="total-amount">Php 999,999.00</strong>
          </div>
        </div>
      </div>
      
      <div class="button-group mt-4 d-flex justify-content-between">
          <button class="btn back-btn">BACK</button>
          <button class="btn confirm-btn">CONFIRM</button>
      </div>
      
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
